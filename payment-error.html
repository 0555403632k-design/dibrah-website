<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دِبرة | خطأ في الدفع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #fff5f5, #ffe8e8);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 30px 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      padding: 50px 40px;
      max-width: 480px; width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, #e53e3e, #c53030);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.2rem; color: #fff;
      animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    h1 { font-size: 1.7rem; font-weight: 900; color: #c53030; margin-bottom: 12px; }
    p { color: #666; font-size: 0.95rem; line-height: 1.7; margin-bottom: 25px; }
    .info-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 25px;
      text-align: right;
    }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px dashed #fed7d7;
      font-size: 0.88rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: #999; }
    .info-row .val { font-weight: 700; color: #c53030; }
    .btn-retry {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #228b64, #1a6b4a);
      color: #fff;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800; font-size: 1rem;
      box-shadow: 0 4px 16px rgba(34,139,100,0.3);
      margin: 5px;
    }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25d366;
      color: #fff;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800; font-size: 1rem;
      margin: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap"><i class="fas fa-exclamation-triangle"></i></div>
    <h1>حدث خطأ في الدفع</h1>
    <p>تعذّر إتمام عملية الدفع. قد يكون السبب خطأ في البيانات أو مشكلة مؤقتة في الشبكة.</p>

    <div class="info-box" id="errDetails">
      <div class="info-row"><span class="lbl">رمز الخطأ</span><span class="val" id="errCode">—</span></div>
      <div class="info-row"><span class="lbl">رقم التتبع</span><span class="val" id="errTrack">—</span></div>
    </div>

    <a href="booking.html" class="btn-retry"><i class="fas fa-redo"></i> حاول مجدداً</a>
    <a href="https://wa.me/966535977511" class="btn-wa"><i class="fab fa-whatsapp"></i> تواصل معنا</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const errCode = params.get('ErrorText') || params.get('errortext') || params.get('error') || params.get('result') || 'غير محدد';
    const trackId = params.get('trackid') || params.get('TrackId') || '—';
    document.getElementById('errCode').textContent  = errCode;
    document.getElementById('errTrack').textContent = trackId;
  </script>
</body>
</html>
