[[redirects]]
  from = "/payment"
  to = "/payment.html"
  status = 200

[[redirects]]
  from = "/payment-success"
  to = "/payment-success.html"
  status = 200

[[headers]]
  for = "/payment.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://pg.neoleap.com.sa; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
