<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دِبرة | نتيجة الدفع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f0faf5, #e6f4ee);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px 20px;
    }
    .result-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      padding: 50px 40px;
      max-width: 520px; width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 90px; height: 90px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.2rem;
      animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .icon-success { background: linear-gradient(135deg, #228b64, #1a6b4a); color: #fff; }
    .icon-fail    { background: linear-gradient(135deg, #e53e3e, #c53030); color: #fff; }

    h1 { font-size: 1.7rem; font-weight: 900; margin-bottom: 10px; }
    .success-title { color: #1a3a2a; }
    .fail-title    { color: #c53030; }
    p { color: #666; font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; }

    .info-box {
      background: #f0faf5;
      border: 1px solid #c8e8d8;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 25px;
      text-align: right;
    }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px dashed #c8e8d8;
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: #888; }
    .info-row .val { font-weight: 700; color: #1a3a2a; }

    .ref-box {
      background: #228b64;
      color: #fff;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 25px;
    }
    .ref-box .ref-label { font-size: 0.85rem; opacity: 0.85; margin-bottom: 4px; }
    .ref-box .ref-num { font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; }

    .btn-home {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #228b64, #1a6b4a);
      color: #fff;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800; font-size: 1rem;
      box-shadow: 0 4px 16px rgba(34,139,100,0.35);
      transition: all 0.25s;
      margin: 5px;
    }
    .btn-home:hover { transform: translateY(-2px); }
    .btn-retry {
      display: inline-flex; align-items: center; gap: 10px;
      background: #fff;
      color: #228b64;
      border: 2px solid #228b64;
      padding: 13px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800; font-size: 1rem;
      transition: all 0.25s;
      margin: 5px;
    }
    .btn-retry:hover { background: #f0faf5; }

    .nl-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 25px;
      font-size: 0.78rem; color: #bbb;
    }
    .nl-logo { font-weight: 900; color: #228b64; }
    .nl-logo em { color: #1a3a2a; font-style: normal; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="result-card" id="resultCard">
    <!-- Content injected by JS -->
  </div>

  <script>
    // Parse NeoLeap response from URL params (POST redirected as GET)
    const params = new URLSearchParams(window.location.search);

    // NeoLeap returns these fields
    const result      = params.get('result')      || params.get('Result')      || '';
    const auth        = params.get('auth')         || params.get('Auth')         || '';
    const ref         = params.get('ref')          || params.get('Ref')          || '';
    const trackId     = params.get('trackid')      || params.get('TrackId')      || '';
    const tranId      = params.get('tranid')       || params.get('TranId')       || '';
    const paymentId   = params.get('paymentid')    || params.get('PaymentId')    || '';
    const postDate    = params.get('postdate')     || params.get('PostDate')     || '';
    const amt         = params.get('amt')          || params.get('Amt')          || '';

    // Get booking data from localStorage
    let booking = {};
    try { booking = JSON.parse(localStorage.getItem('dibrah_booking') || '{}'); } catch(e) {}

    const card = document.getElementById('resultCard');
    const isSuccess = result === 'CAPTURED' || result === 'APPROVED' || auth !== '';

    if (isSuccess) {
      card.innerHTML = `
        <div class="icon-wrap icon-success"><i class="fas fa-check"></i></div>
        <h1 class="success-title">تمت عملية الدفع بنجاح!</h1>
        <p>شكراً لك! تم استلام دفعتك وتأكيد حجزك. سيتواصل معك فريق دِبرة قريباً على رقم جوالك.</p>

        <div class="ref-box">
          <div class="ref-label">رقم المرجع</div>
          <div class="ref-num">${ref || tranId || paymentId || booking.trackId || '—'}</div>
        </div>

        <div class="info-box">
          <div class="info-row"><span class="lbl">الخدمة</span><span class="val">${booking.service || '—'}</span></div>
          <div class="info-row"><span class="lbl">الباقة</span><span class="val">${booking.package || '—'}</span></div>
          <div class="info-row"><span class="lbl">العميل</span><span class="val">${booking.name || '—'}</span></div>
          <div class="info-row"><span class="lbl">الجوال</span><span class="val">${booking.phone || '—'}</span></div>
          <div class="info-row"><span class="lbl">المبلغ المدفوع</span><span class="val">${amt || booking.amount || '—'} ريال</span></div>
          ${postDate ? `<div class="info-row"><span class="lbl">تاريخ الدفع</span><span class="val">${postDate}</span></div>` : ''}
        </div>

        <a href="https://stunning-cuchufli-988762.netlify.app" class="btn-home">
          <i class="fas fa-home"></i> العودة للرئيسية
        </a>

        <div class="nl-badge">
          <i class="fas fa-shield-alt" style="color:#228b64;"></i>
          تمت المعالجة بواسطة <span class="nl-logo" style="margin-right:4px;">neo<em>leap</em></span>
          | مرخص من ساما
        </div>
      `;
      localStorage.removeItem('dibrah_booking');
    } else {
      // Failed or cancelled
      const errMsg = params.get('ErrorText') || params.get('errortext') || params.get('error') || 'تعذّر إتمام عملية الدفع.';
      card.innerHTML = `
        <div class="icon-wrap icon-fail"><i class="fas fa-times"></i></div>
        <h1 class="fail-title">لم تكتمل عملية الدفع</h1>
        <p>${errMsg}<br>يرجى المحاولة مرة أخرى أو التواصل معنا عبر واتساب.</p>

        <div class="info-box">
          <div class="info-row"><span class="lbl">رمز الخطأ</span><span class="val">${result || 'غير محدد'}</span></div>
          <div class="info-row"><span class="lbl">رقم التتبع</span><span class="val">${trackId || booking.trackId || '—'}</span></div>
        </div>

        <a href="booking.html" class="btn-retry"><i class="fas fa-redo"></i> حاول مجدداً</a>
        <a href="https://wa.me/966535977511" class="btn-home" style="background:linear-gradient(135deg,#25d366,#128c7e);">
          <i class="fab fa-whatsapp"></i> تواصل معنا
        </a>

        <div class="nl-badge">
          <i class="fas fa-shield-alt" style="color:#228b64;"></i>
          بوابة الدفع <span class="nl-logo" style="margin-right:4px;">neo<em>leap</em></span>
          | مرخص من ساما
        </div>
      `;
    }
  </script>
</body>
</html>
